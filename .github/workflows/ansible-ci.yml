name: Ansible CI (dev)

on:
  pull_request:
    branches: [main]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ansible-ci-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  ANSIBLE_CORE_VERSION: '2.17.2'
  ANSIBLE_LINT_VERSION: '24.7.0'
  YAMLLINT_VERSION: '1.35.1'

jobs:
  validate:
    name: Ansible Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install \
            ansible-core==${ANSIBLE_CORE_VERSION} \
            ansible-lint==${ANSIBLE_LINT_VERSION} \
            yamllint==${YAMLLINT_VERSION}

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

      - name: Check inventory
        run: ansible-inventory --list
      
      - name: Syntax check bootstrap.yml
        run: ansible-playbook --syntax-check playbooks/bootstrap.yml
      
      - name: Syntax check monitoring.yml
        run: ansible-playbook --syntax-check playbooks/monitoring.yml

      - name: Syntax check app.yml
        run: ansible-playbook --syntax-check playbooks/app.yml
