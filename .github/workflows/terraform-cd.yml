name: Terraform CD (dev)

on:
  push:
    branches: [main]
    paths:
      - "terraform/envs/dev/**"
      - "terraform/modules/**"
      - ".github/workflows/terraform-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-cd-dev
  cancel-in-progress: false

env:
  TF_WORKING_DIR: terraform/envs/dev
  TF_VERSION: "1.6.6"
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  apply:
    name: Terraform Apply (dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare tfvars
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i "s|YOUR_PUBLIC_IP/32|${{ vars.DEV_SSH_CIDR }}|g" terraform.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -lock-timeout=5m -var-file=terraform.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
