---
- name: Deploy monitoring stack
  hosts: monitoring_nodes
  become: true

  pre_tasks:
    - name: Create monitoring base directory
      ansible.builtin.file:
        path: "{{ monitoring_base_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

  roles:
    - prometheus
    - alertmanager
    - grafana
    - monitoring_compose
