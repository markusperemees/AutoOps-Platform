---
- name: Create app deployment directory
  ansible.builtin.file:
    path: "{{ app_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Template app Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart app stack

- name: Start app stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ app_base_dir }}"
  changed_when: false

- name: Wait for app services to be reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ item }}"
    delay: 3
    timeout: 120
  loop: "{{ app_service_ports }}"
