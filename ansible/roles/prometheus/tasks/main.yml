---
- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ monitoring_base_dir }}/prometheus", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ monitoring_base_dir }}/prometheus/data", owner: "65534", group: "65534", mode: "0755" }

- name: Template Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_base_dir }}/prometheus/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Recreate Prometheus

- name: Template Prometheus alert rules
  ansible.builtin.template:
    src: alert-rules.yml.j2
    dest: "{{ monitoring_base_dir }}/prometheus/alert-rules.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Recreate Prometheus
  
