---
- name: Create monitoring base directory
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Template monitoring Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart monitoring stack

- name: Start monitoring stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ monitoring_base_dir }}"
  changed_when: false

- name: Wait for monitoring services to be reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ item }}"
    delay: 3
    timeout: 120
  loop: "{{ monitoring_service_ports }}"
 