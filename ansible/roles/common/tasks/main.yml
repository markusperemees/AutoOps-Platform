---
- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  tags: [packages]

- name: Install required packages
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
  tags: [packages]

- name: Ensure Docker CLI plugins directory exists
  ansible.builtin.file:
    path: "{{ docker_compose_dest | dirname }}"
    state: directory
    mode: "0755"

- name: Install Docker Compose v2 plugins
  ansible.builtin.get_url:
    url: "{{ docker_compose_url }}"
    dest: "{{ docker_compose_dest }}"
    mode: "0755"

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add system user to docker group
  ansible.builtin.user:
    name: "{{ system_user }}"
    groups: docker
    append: true

- name: Enable and start chronyd
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true
